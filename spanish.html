<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترجم أسباني </title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color:#666666;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dictionary-card {
            background: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-radius: 20px;
            border: 1px solid #e0e0e0; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .lang-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            color: #666666;
            font-weight: 600;
        }

        .swap-btn {
            background: #f5f5f5; /* رمادي فاتح جداً */
            color: #333333; /* رمادي غامق */
            border: 1px solid #dddddd;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

            .swap-btn:hover {
                background: #eeeeee;
                border-color: #999999;
                transform: rotate(180deg);
            }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #f0f0f0; /* رمادي شاحب */
            border-radius: 12px;
            font-size: 18px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            background-color: #fafafa; /* رمادي خفيف جداً للحقل */
            color: #333;
            transition: 0.3s;
        }

            input:focus {
                border-color: #999999; /* رمادي غامق عند الضغط */
                background-color: #ffffff;
            }

        .result-area {
            margin-top: 40px;
            min-height: 140px;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }

        .translation-text {
            font-size: 42px;
            font-weight: 800;
            color: #222222; /* رمادي قريب من الأسود */
            margin-bottom: 15px;
            min-height: 55px;
        }

        .btn-audio {
            background: #444444; /* رمادي غامق جداً */
            color: #ffffff;
            border: none;
            padding: 10px 30px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            display: none;
            margin: 0 auto;
            transition: 0.3s;
        }

            .btn-audio:hover {
                background: #222222;
            }

        .placeholder-text {
            color: #bbbbbb; /* رمادي فاتح للنصوص التوضيحية */
            font-size: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="dictionary-card">
        <div class="lang-header">
            <span id="label-from">العربية</span>
            <button class="swap-btn" id="swapBtn">⇄</button>
            <span id="label-to">الإسبانية</span>
        </div>

        <input type="text" id="wordInput" placeholder="اكتب الكلمة كاملة هنا..." autocomplete="off">

        <div class="result-area">
            <div id="translationResult" class="translation-text"></div>
            <div id="placeholder" class="placeholder-text">في انتظار الكلمة...</div>
            <button class="btn-audio" id="audioBtn">🔊 سماع النطق</button>
        </div>
    </div>
    <script>
        // القاموس الكامل (150 كلمة مرتبة)
        const dictionary = {
            // العائلة والأشخاص (20)
            "أب": "Padre", "أم": "Madre", "أخ": "Hermano", "أخت": "Hermana", "ابن": "Hijo", "ابنة": "Hija", "جد": "Abuelo", "جدة": "Abuela", "رجل": "Hombre", "امرأة": "Mujer", "طفل": "Niño",
            "صديق": "Amigo", "زوج": "Esposo", "زوجة": "Esposa", "ملك": "Rey", "ملكة": "Reina", "ناس": "Gente", "شخص": "Persona", "عائلة": "Familia", "جار": "Vecino",

            // الأماكن والمنزل (20)
            "بيت": "Casa", "غرفة": "Habitación", "مطبخ": "Cocina", "حمام": "Baño", "باب": "Puerta", "نافذة": "Ventana", "سرير": "Cama", "طاولة": "Mesa", "كرسي": "Silla", "مدرسة": "Escuela",
            "جامعة": "Universidad", "مكتب": "Oficina", "مستشفى": "Hospital", "مطعم": "Restaurante", "فندق": "Hotel", "سوق": "Mercado", "شارع": "Calle", "مدينة": "Ciudad", "دولة": "País",
            "حديقة": "Jardín",

            // الطبيعة والوقت (20)
            "شمس": "Sol", "قمر": "Luna", "سماء": "Cielo", "أرض": "Tierra", "بحر": "Mar", "نهر": "Río", "جبل": "Montaña", "شجرة": "Árbol", "وردة": "Flor", "حيوان": "Animal", "وقت": "Tiempo",
            "يوم": "Día", "أسبوع": "Semana", "شهر": "Mes", "سنة": "Año", "ساعة": "Hora", "دقيقة": "Minuto", "الآن": "Ahora", "اليوم": "Hoy", "غداً": "Mañana",

            // الطعام والشراب (15)
            "طعام": "Comida", "ماء": "Agua", "خبز": "Pan", "حليب": "Leche", "قهوة": "Café", "شاي": "Té", "سكر": "Azúcar", "ملح": "Sal", "لحم": "Carne", "سمك": "Pescado", "فاكهة": "Fruta",
            "خضار": "Verdura", "أرز": "Arroz", "عصير": "Zumo", "بيض": "Huevo",

            // الأفعال الشائعة (30)
            "يأكل": "Comer", "يشرب": "Beber", "ينام": "Dormir", "يذهب": "Ir", "يأتي": "Venir", "يرى": "Ver", "يسمع": "Oír", "يتكلم": "Hablar", "يفهم": "Entender", "يعرف": "Saber",
            "يعمل": "Trabajar", "يلعب": "Jugar", "يقرأ": "Leer", "يكتب": "Escribir", "يشتري": "Comprar", "يبيع": "Vender", "يسكن": "Vivir", "يحب": "Amar", "يكره": "Odiar", "يريد": "Querer",
            "يفعل": "Hacer", "يخرج": "Salir", "يدخل": "Entrar", "يفتح": "Abrir", "يغلق": "Cerrar", "يجلس": "Sentarse", "يقف": "Pararse", "يغني": "Cantar", "يرقص": "Bailar", "يسافر": "Viajar",

            // الصفات (30)
            "كبير": "Grande", "صغير": "Pequeño", "جميل": "Hermoso", "قبيح": "Feo", "سريع": "Rápido", "بطيء": "Lento", "سهل": "Fácil", "صعب": "Difícil", "جديد": "Nuevo", "قديم": "Viejo",
            "سعيد": "Feliz", "حزين": "Triste", "قوي": "Fuerte", "ضعيف": "Débil", "ساخن": "Caliente", "بارد": "Frío", "غني": "Rico", "فقير": "Pobre", "ذكي": "Inteligente", "غبي": "Tonto",
            "طويل": "Largo", "قصير": "Corto", "نظيف": "Limpio", "متسخ": "Sucio", "مفتوح": "Abierto", "مغلق": "Cerrado", "مضحك": "Divertido", "ممل": "Aburrido", "مريض": "Enfermo",
            "سليم": "Sano",

            // الأرقام والألوان (15)
            "واحد": "Uno", "اثنان": "Dos", "ثلاثة": "Tres", "أربعة": "Cuatro", "خمسة": "Cinco", "عشرة": "Diez", "مائة": "Cien", "أبيض": "Blanco", "أسود": "Negro", "أحمر": "Rojo",
            "أزرق": "Azul", "أخضر": "Verde", "أصفر": "Amarillo", "برتقالي": "Naranja", "رمادي": "Gris"
        };
        

        // توليد القاموس العكسي تلقائياً
        const reverseDictionary = {};
        for (let key in dictionary) {
            reverseDictionary[dictionary[key].toLowerCase()] = key;
        }

        let isArabicToSpanish = true;
        const wordInput = document.getElementById('wordInput');
        const translationResult = document.getElementById('translationResult');
        const placeholder = document.getElementById('placeholder');
        const audioBtn = document.getElementById('audioBtn');
        const swapBtn = document.getElementById('swapBtn');
        const labelFrom = document.getElementById('label-from');
        const labelTo = document.getElementById('label-to');

        // تبديل اتجاه اللغة
        swapBtn.addEventListener('click', () => {
            isArabicToSpanish = !isArabicToSpanish;
            labelFrom.innerText = isArabicToSpanish ? "العربية" : "الإسبانية";
            labelTo.innerText = isArabicToSpanish ? "الإسبانية" : "العربية";
            wordInput.value = "";
            wordInput.placeholder = isArabicToSpanish ? "اكتب بالعربية..." : "Escribe en español...";
            clearResult();
        });

        // مراقبة الكتابة للترجمة الفورية عند التطابق
        wordInput.addEventListener('input', function () {
            const val = this.value.trim();
            let result = null;

            if (isArabicToSpanish) {
                result = dictionary[val] || null;
            } else {
                result = reverseDictionary[val.toLowerCase()] || null;
            }

            if (result) {
                placeholder.style.display = "none";
                translationResult.innerText = result;
                audioBtn.style.display = "block";

                audioBtn.onclick = () => {
                    const utterance = new SpeechSynthesisUtterance(result);
                    utterance.lang = isArabicToSpanish ? 'es-ES' : 'ar-SA';
                    window.speechSynthesis.speak(utterance);
                };
            } else {
                clearResult();
            }
        });

        function clearResult() {
            translationResult.innerText = "";
            placeholder.style.display = "block";
            audioBtn.style.display = "none";
        }
    </script>

</body>
</html>
